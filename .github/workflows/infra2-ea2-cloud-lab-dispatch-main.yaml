name: INFRA2 - EA2 cloud lab (delegado EA2) (remoto)

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: Región AWS
        required: true
        type: string
        default: us-east-1
      instance_type:
        description: Tipo EC2 por nodo k3s
        required: true
        type: string
        default: t3.medium

jobs:
  delegar:
    uses: recouma/AUY1104-SharedWorkflows/.github/workflows/ea2-provision-k8s-sandbox.yaml@EA2
    with:
      aws_region: ${{ inputs.aws_region }}
      instance_type: ${{ inputs.instance_type }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      EA2_SSH_PRIVATE_KEY: ${{ secrets.EA2_SSH_PRIVATE_KEY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
